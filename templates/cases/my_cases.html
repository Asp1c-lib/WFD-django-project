<!DOCTYPE html>
<html>
<head>
    <title>My Cases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>My Support Cases</h2>

        <div>
            <a href="/dashboard/" class="btn btn-secondary">Dashboard</a>
            <a href="/cases/create/" class="btn btn-success">New Case</a>
        </div>

    </div>

    {% for case in cases %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">

                <h5>{{ case.title }}</h5>
                <p>{{ case.description }}</p>

                <span class="badge bg-info">{{ case.status }}</span>
                <span class="badge bg-secondary">{{ case.priority }}</span>

                <a href="/cases/{{ case.id }}/" class="btn btn-sm btn-primary float-end">
                    View
                </a>

            </div>
        </div>
    {% empty %}
        <p>No cases found.</p>
    {% endfor %}

</div>

</body>
</html>
